<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | Tiptronic Group</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/cart.css" />
  <script type="module" src="../js/cart-page.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a class="logo" href="../">Tiptronic Group</a>
        <nav class="nav-links">
          <a href="../catalog/">Catalog</a>
          <a href="../#about">How It Works</a>
          <a href="../#contacts">Contact</a>
        </nav>
      </div>
    </div>
  </header>

    <main class="cart-page">
    <div class="container">
      <div class="cart-header">
        <div>
          <p class="eyebrow">Your request cart</p>
          <h1>Your Cart</h1>
          <p class="cart-subtitle">Add parts from the catalog, adjust quantities, and send one request.</p>
        </div>
        <div class="cart-summary-mini">
          <span id="cartCount">0 items</span>
        </div>
      </div>

      <div class="cart-layout">
        <section class="cart-list-wrap">
          <div id="cartEmpty" class="cart-empty" hidden>
            Your cart is empty. Go to the <a href="../catalog/">catalog</a> and add items.
          </div>

          <div id="cartList" class="cart-list"></div>
        </section>

        <aside class="cart-sidebar">
          <div class="cart-panel">
            <h2>Summary</h2>
            <div class="cart-summary-row">
              <span>Items</span>
              <strong id="cartItemsCount">0</strong>
            </div>
            <div class="cart-summary-row">
              <span>Total</span>
              <strong id="cartTotal">EUR 0.00</strong>
            </div>

            <div class="cart-actions">
              <button id="clearCartBtn" class="btn btn-secondary" type="button">Clear cart</button>
              <a class="btn btn-primary" href="../#order">Contact us about this cart</a>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>
</body>
</html>
